<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>

  <!-- Spine -->
  <line x1="16" y1="10" x2="16" y2="24" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Left page arc -->
  <path d="M15.2 10.5 C11 11 7.5 13 7.5 17 C7.5 21 11 22.5 15.2 23"
        stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.95"/>
  <!-- Left ruled lines -->
  <line x1="9.5"  y1="15"   x2="14.5" y2="14.4" stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="9.5"  y1="17.5" x2="14.5" y2="17"   stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="10"   y1="20"   x2="14.5" y2="19.6"  stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>

  <!-- Right page arc -->
  <path d="M16.8 10.5 C21 11 24.5 13 24.5 17 C24.5 21 21 22.5 16.8 23"
        stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.75"/>
  <!-- Right ruled lines -->
  <line x1="17.5" y1="14.4" x2="22.5" y2="15"   stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>
  <line x1="17.5" y1="17"   x2="22.5" y2="17.5" stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>
  <line x1="17.5" y1="19.6" x2="22"   y2="20"   stroke="white" stroke-width="0.7" stroke-linecap="round" opacity="0.35"/>

  <!-- 4-point sparkle -->
  <g filter="url(#glow)">
    <path d="M16 4 L16.55 6.6 L16 9.2 L15.45 6.6 Z" fill="white"/>
    <path d="M13.4 6.6 L16 7.15 L18.6 6.6 L16 6.05 Z" fill="white"/>
  </g>
</svg>
